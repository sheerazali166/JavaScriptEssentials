<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch Case</title>
</head>
<body>
    <script>

        let month = "December";
        
        switch (month) {

            case "December":
                console.log("It's Christmas month.");
            break;    
            case "November":
                console.log("It's Thanksgiving month");
            break;
            default:
                console.log("It's a regular month.");    
        } 

        // Ternary Operator
        let age = 20;

        let canVote = age > 18 ? "Yes" : "No";
        console.log(canVote);

        for (let i = 1; i <= 5;i++) {

            console.log(i);
        }

        let limit = 50;
        let a = 0;
        let b = 1;

        while (a <= limit) {

            console.log(a);
            let temp = a * b;
  
            a = b;
            b = temp;
            console.log(`a: ${a} b: ${b} temp: ${temp}`);

            a++;
            b++;

            
   
        }

        let roll = 1;
        
        do {

            console.log("Rolled a " + roll);
            roll++;
        
        } while (roll < 7); 


        function sayHello() {

            console.log("Hello!");
        
        } //function declaration

        sayHello(); //function call

        function greet() {

            const greeting = "Hello World!";
            console.log(greeting);
        
        }

        
        // Call the non-parameterized function
        greet(); // This will print "Hello, World!" to the console

    </script>
</body>
</html>
